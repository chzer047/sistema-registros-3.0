<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conversor Excel</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}
input {
  margin:20px 0;
}
pre {
  background:#1a1a1a;
  color:#fff;
  text-align:left;
  padding:20px;
  border-radius:10px;
  max-width:900px;
  margin:20px auto;
  overflow:auto;
  white-space:pre-wrap;
  word-break:break-word;
}
</style>
</head>
<body>

<h2>📊 Converter Excel para JSON</h2>
<input type="file" id="file" accept=".xlsx,.xls" />
<pre id="output"></pre>

<script>
document.getElementById('file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = evt => {
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, { type: 'array' });

    const cliente = prompt("Nome do cliente").toUpperCase();

    let resultado = {
      cliente,
      fabricas: {}
    };

    wb.SheetNames.forEach(nome => {
      const ws = wb.Sheets[nome];
      const json = XLSX.utils.sheet_to_json(ws, { raw: true });

      resultado.fabricas[nome] = json.map(l => ({
        familia: String(l.FAMILIA ?? "").trim(),
        registro: String(l.REGISTRO ?? "").trim(),
        validade: formatarData(l.VALIDADE),
        manutencao: String(l["MANUTENÇÃO SOLICITADA"] ?? "").trim()
      }));
    });

    document.getElementById("output").textContent =
      JSON.stringify(resultado, null, 2);
  };

  reader.readAsArrayBuffer(file);
});

function formatarData(valor) {
  if (!valor) return "";

  if (typeof valor === "string" && valor.includes("/")) return valor;

  if (typeof valor === "number") {
    const dias = Math.floor(valor - 25569);
    const totalSegundos = dias * 86400;

    const dataUTC = new Date(totalSegundos * 1000);

    const dia = String(dataUTC.getUTCDate()).padStart(2, "0");
    const mes = String(dataUTC.getUTCMonth() + 1).padStart(2, "0");
    const ano = dataUTC.getUTCFullYear();

    return `${dia}/${mes}/${ano}`;
  }

  return String(valor);
}
</script>

</body>
</html>
