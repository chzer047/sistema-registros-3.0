<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conversor Excel</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body style="background:#0f0f0f;color:white;text-align:center;padding:40px;">

<h2>📊 Converter Excel</h2>

<input type="file" id="file">

<pre id="output"></pre>

<script>
document.getElementById('file').addEventListener('change', e => {
  const reader = new FileReader();

  reader.onload = evt => {
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, {type:'array'});

    const cliente = prompt("Nome do cliente").toUpperCase();

    let resultado = { cliente, fabricas:{} };

    wb.SheetNames.forEach(nome => {
      const ws = wb.Sheets[nome];
      const json = XLSX.utils.sheet_to_json(ws);

      resultado.fabricas[nome] = json.map(l => ({
        familia: String(l.FAMILIA),
        registro: String(l.REGISTRO),
        validade: formatarData(l.VALIDADE),
        manutencao: String(l["MANUTENÇÃO SOLICITADA"] || "")
      }));
    });

    document.getElementById("output").textContent =
      JSON.stringify(resultado, null, 2);
  };

  reader.readAsArrayBuffer(e.target.files[0]);
});

function formatarData(valor) {
  if (!valor) return "";

  if (String(valor).includes("/")) return valor;

  const data = new Date((valor - 25569) * 86400 * 1000);

  return data.toLocaleDateString("pt-BR");
}
</script>

</body>
</html>
