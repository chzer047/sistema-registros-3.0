<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conversor Excel</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { background:#0b0b0b; color:white; text-align:center; font-family:Arial; padding:40px; }
pre { background:#1a1a1a; padding:20px; border-radius:10px; text-align:left; max-width:1000px; margin:auto; }
</style>
</head>

<body>

<h2>📊 Converter Excel</h2>
<input type="file" id="file" />

<pre id="out"></pre>

<script>
document.getElementById("file").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  const cliente = prompt("Nome do cliente").toUpperCase();

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);

  let resultado = { cliente, fabricas: {} };

  wb.SheetNames.forEach(nome => {
    const ws = wb.Sheets[nome];
    const json = XLSX.utils.sheet_to_json(ws, { raw: true });

    resultado.fabricas[nome] = json.map(l => ({
      familia: String(l.FAMILIA ?? ""),
      registro: String(l.REGISTRO ?? ""),
      validade: formatarData(l.VALIDADE),
      manutencao: String(l["MANUTENÇÃO SOLICITADA"] ?? "")
    }));
  });

  document.getElementById("out").textContent =
    JSON.stringify(resultado, null, 2);
});

function formatarData(v) {
  if (!v) return "";

  if (typeof v === "string") return v;

  if (typeof v === "number") {
    const d = XLSX.SSF.parse_date_code(v);
    return `${String(d.d).padStart(2,"0")}/${String(d.m).padStart(2,"0")}/${d.y}`;
  }

  return "";
}
</script>

</body>
</html>
