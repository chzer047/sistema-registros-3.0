<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conversor Excel → JSON</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  text-align: center;
  padding: 40px;
}

pre {
  margin-top: 30px;
  text-align: left;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>📊 Converter Excel</h2>

<input type="file" id="file" />

<pre id="output"></pre>

<script>
document.getElementById('file').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt) {
    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, { type: 'array' });

    const cliente = prompt("Nome do cliente (ex: BOLSA)").toUpperCase();

    let resultado = {
      cliente: cliente,
      fabricas: {}
    };

    workbook.SheetNames.forEach(nomeAba => {
      const worksheet = workbook.Sheets[nomeAba];
      const json = XLSX.utils.sheet_to_json(worksheet);

      resultado.fabricas[nomeAba] = json.map(linha => ({
        familia: String(linha.FAMILIA),
        registro: String(linha.REGISTRO), // mantém exatamente como no Excel
        validade: formatarData(linha.VALIDADE),
        manutencao: String(linha["MANUTENÇÃO SOLICITADA"] || "")
      }));
    });

    document.getElementById("output").textContent =
      JSON.stringify(resultado, null, 2);
  };

  reader.readAsArrayBuffer(file);
}

// FORMATA DATA CORRETAMENTE
function formatarData(valor) {
  if (!valor) return "";

  if (String(valor).includes("/")) return valor;

  const data = new Date((valor - 25569) * 86400 * 1000);

  return data.toLocaleDateString("pt-BR");
}
</script>

</body>
</html>
