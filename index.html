<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

input {
  padding:12px;
  border-radius:8px;
  border:none;
  width:300px;
}

button {
  padding:12px;
  border:none;
  border-radius:8px;
  margin-left:10px;
  cursor:pointer;
}

#resultado {
  margin-top:30px;
}
</style>

</head>

<body>

<div id="login">
  <h2>🔒 Acesso restrito</h2>
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none;">
  <h2>🔍 Consulta</h2>

  <input id="busca" placeholder="ex: fam 1 bolsa fab2">
  <button onclick="buscar()">Buscar</button>

  <div id="resultado"></div>
</div>

<script>
const SENHA = "123456";

function entrar() {
  if (document.getElementById("senha").value === SENHA) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("Senha incorreta");
  }
}
</script>

<script src="script.js"></script>

</body>
</html>
